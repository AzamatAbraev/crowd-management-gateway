server:
  port: 8082


spring:
  application:
    name: crowd-management-gateway

  security:
    oauth2:
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: gateway
            client-secret: CE0TlwAp5otsTBTUnF4HBSp9RClrwVct
            scope: openid, profile, email
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/crowd-management


  cloud:
    gateway.server.webflux:
      default-filters:
        - TokenRelay

      routes:
        - id: crowd-management-api
          uri: http://localhost:8081
          predicates:
            - Path=/demo/**
          filters:
            - PrefixPath=/api/v1

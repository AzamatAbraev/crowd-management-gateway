server:
  port: 8082

  reactive:
    session:
      cookie:
        same-site: lax
        secure: false

spring:
  application:
    name: crowd-management-gateway


  security:
    oauth2:
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: gateway
            client-secret: CE0TlwAp5otsTBTUnF4HBSp9RClrwVct
            scope: openid, profile, email
            redirect-uri: http://localhost:8082/login/oauth2/code/keycloak
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/crowd-management


  cloud:
    gateway.server.webflux:
      default-filters:
        - TokenRelay
      routes:
        - id: crowd-management-api
          uri: http://localhost:8081
          predicates:
            - Path=/resources/**
          filters:
            - PrefixPath=/api/v1

        - id: crowd-management-people-counter
          uri: http://localhost:8081
          predicates:
            - Path=/people/**
          filters:
            - PrefixPath=/api/v1

#        - id: crowd-management-ws
#          uri: ws://localhost:8081
#          predicates:
#            - Path=/ws/occupancy/**
#          filters:
#            - PreserveHostHeader


      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true



logging:
  level:
    org:
      springframework:
        security: debug
